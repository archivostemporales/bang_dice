<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BANG! Dice Game</title>
    <style>
        :root {
            --wood: #5d4037;
            --felt: #2e7d32;
            --paper: #f4e4bc;
            --accent: #d32f2f;
            --gold: #ffd700;
        }
        
body {
    margin: 0; 
    background-color: #1a1a1a;
    font-family: 'Verdana', sans-serif;
    display: flex; 
    flex-direction: column; /* Alinea el tablero y luego el footer */
    align-items: center;
    min-height: 100vh;
    overflow-y: auto; /* Permite bajar a ver el footer */
}
        #setup-screen {
            position: fixed; inset: 0; z-index: 5000;
            background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center;
        }
        .setup-box { background: var(--paper); padding: 30px; border: 5px solid var(--wood); border-radius: 15px; text-align: center; }

        #board-container {
            display: none; width: 100vw; max-width: 1400px; min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            grid-template-rows: minmax(320px, 1fr) minmax(320px, 1fr) minmax(320px, 1fr);
            gap: 15px; padding: 20px; box-sizing: border-box;
            background: radial-gradient(circle, var(--felt) 0%, #1b4d1f 100%);
        }

        #center-area {
            grid-area: 2 / 2; background: rgba(0,0,0,0.7);
            border: 3px solid var(--gold); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 15px; box-shadow: 0 0 40px black; align-self: center;
        }

        .dice-zone { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; min-height: 70px; align-items: center; }
        .die { width: 50px; height: 50px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #999; }
        .die img { width: 85%; height: 85%; }
        .die.locked { border: 3px solid var(--accent); background: #ffdada; cursor: not-allowed; box-shadow: 0 0 10px var(--accent); }
        .dice-divider { width: 90%; height: 2px; background: var(--gold); margin: 15px 0; }

        .player-card {
            background: var(--paper); border: 2px solid var(--wood);
            border-radius: 12px; padding: 12px; position: relative;
            display: flex; flex-direction: column; height: 100%; min-height: 300px;
            box-sizing: border-box; box-shadow: 0 6px 12px rgba(0,0,0,0.5); overflow: hidden;
        }

        .card-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; padding-right: 5px; }
        .card-content::-webkit-scrollbar { width: 4px; }
        .card-content::-webkit-scrollbar-thumb { background: var(--wood); border-radius: 5px; }

        .is-sheriff { border: 5px solid var(--gold); box-shadow: 0 0 25px var(--gold); }
        .sheriff-badge { position: absolute; top: -8px; right: -8px; width: 50px; z-index: 10; }

        .char-name { font-weight: bold; font-size: 0.85rem; text-align: center; color: #000; border-bottom: 2px solid rgba(0,0,0,0.1); padding-bottom: 4px; }
        .char-desc { font-style: italic; font-size: 0.75rem; color: #444; text-align: center; line-height: 1.2; }
        .char-portrait { width: 100%; height: 75px; object-fit: contain; margin: 5px 0; background: rgba(0,0,0,0.03); border-radius: 4px; }
        
        .stats { display: flex; justify-content: space-around; font-size: 1.5rem; font-weight: bold; padding: 8px 0; background: rgba(0,0,0,0.05); border-radius: 8px; margin-top: auto; }
        .delete-btn { position: absolute; top: 5px; left: 5px; background: var(--accent); color: white; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 2px solid white; z-index: 20; }

        .p-pos-0 { grid-area: 1 / 1; } .p-pos-1 { grid-area: 1 / 2; } .p-pos-2 { grid-area: 1 / 3; }
        .p-pos-7 { grid-area: 2 / 1; }                           .p-pos-3 { grid-area: 2 / 3; }
        .p-pos-6 { grid-area: 3 / 1; } .p-pos-5 { grid-area: 3 / 2; } .p-pos-4 { grid-area: 3 / 3; }

        #indian-popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #8d2b2b 0%, #4a1414 100%);
            color: white; padding: 35px; border: 5px solid var(--gold);
            border-radius: 20px; text-align: center; z-index: 6000; width: 320px; box-shadow: 0 0 150px black;
        }
        .btn-main { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 7000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<audio id="bg-music" loop>
    <source src="images/western.mp3" type="audio/mpeg" loop>
    Tu navegador no soporta el elemento de audio.
</audio>

<audio id="snd-dice">
    <source src="images/dice.mp3" type="audio/mpeg">
</audio>

<audio id="snd-click">
    <source src="images/clic.mp3" type="audio/mpeg">
</audio>

<div id="setup-screen">
    <div class="setup-box">
        <h2 style="color: var(--accent);">BANG! DICE GAME</h2>
        <p>Número de pistoleros (4-8):</p>
        <input type="number" id="player-count" min="4" max="8" value="8" style="font-size: 2rem; width: 80px; text-align: center;">
        <br><br>
        <button class="btn-main" onclick="startGame()">INICIAR JUEGO</button>
    </div>
</div>

<div id="indian-popup">
    <div style="font-size: 3rem;">🏹</div>
    <h2 style="margin: 10px 0;">¡ATAQUE INDIO!</h2>
    <p style="font-size: 0.9rem;">Cada jugador pierde tantas vidas como flechas tenga.</p>
    <button class="btn-main" style="background: var(--gold); color: #000;" onclick="processIndianAttack()">QUITAR VIDAS Y REINICIAR FLECHAS</button>
</div>

<div id="char-modal" class="modal" onclick="this.style.display='none'">
    <div style="background: var(--paper); padding: 30px; border-radius: 15px; text-align:center; max-width: 90%; border: 5px solid var(--wood);">
        <h2 id="modal-name"></h2>
        <img id="modal-img" src="" style="max-height: 60vh;">
        <p id="modal-desc" style="font-style: italic; margin-top: 20px; font-size: 1.1rem;"></p>
    </div>
</div>

<div id="board-container">
    <div id="center-area">
        <div id="arrow-pool" style="color: var(--gold); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px;">FLECHAS: 0 / 9</div>
        <div class="dice-zone" id="roll-zone"></div>
        <div class="dice-divider"></div>
        <div class="dice-zone" id="reserve-zone"></div>
        <div id="game-msg" style="color: #ff5252; font-weight: bold; font-size: 0.9rem; margin: 10px 0; height: 20px;"></div>
        <div style="display:flex; gap:10px;">
            <button class="btn-main" id="roll-btn" onclick="handleRoll()">LANZAR (3)</button>
            <button onclick="endTurn()" style="background: none; color: #aaa; border: 1px solid #555; cursor: pointer; padding: 5px 10px; border-radius: 5px;">PASAR</button>
        </div>
    </div>
</div>

<script>
let musicPlaying = false;

function playSound(id) {
    const sound = document.getElementById(id);
    sound.currentTime = 0; // Reinicia el sonido si ya estaba sonando
    sound.play().catch(e => console.log("Error de audio:", e));
}

function toggleMusic() {
    const music = document.getElementById('bg-music');
    const icon = document.getElementById('music-icon');
    const status = document.getElementById('music-status');

    if (music.paused) {
        music.play();
        music.volume = 0.3; // Volumen suave
        icon.innerText = "🔊";
        status.innerText = "MÚSICA: ON";
        musicPlaying = true;
    } else {
        music.pause();
        icon.innerText = "🔈";
        status.innerText = "MÚSICA: OFF";
        musicPlaying = false;
    }
}

    const charsData = [
        {n: 'Bart Cassidy', v: 8, d: 'Puedes coger una flecha en lugar de perder un punto de vida (excepto en caso de indios o dinamita).', img: 'bart_cassidy_8.jpg'},
        {n: 'Black Jack', v: 8, d: 'Puedes volver a lanzar dinamita (¡pero no si sacas 3 o más!).', img: 'black_jack_8.jpg'},
        {n: 'Calamity Janet', v: 8, d: 'Puedes usar (1) como (2) y viceversa.', img: 'calamity_janet_8.jpg'},
        {n: 'El Gringo', v: 7, d: 'Cuando un jugador te haga perder 1 o más puntos de vida, debe coger 1 flecha.', img: 'el_gringo_7.jpg'},
        {n: 'Jesse Jones', v: 9, d: 'Si tienes 4 puntos de vida o menos, obtienes 2 vidas si usas la cerveza contigo mismo.', img: 'jesse_jones_9.jpg'},
        {n: 'Jourdonnais', v: 7, d: 'Nunca pierde más de 1 punto de vida por los indios.', img: 'jourdonnais_7.jpg'},
        {n: 'Kit Carlson', v: 7, d: 'Puedes descartar 1 flecha de cualquier jugador por cada Gatling.', img: 'kit_carlson_7.jpg'},
        {n: 'Lucky Duke', v: 8, d: 'Puedes repetir la tirada una vez adicional.', img: 'lucky_duke_8.jpg'},
        {n: 'Paul Regret', v: 9, d: 'Nunca pierdes puntos de vida por la ametralladora Gatling.', img: 'paul_regret_9.jpg'},
        {n: 'Pedro Ramírez', v: 8, d: 'Cada vez que pierdes 1 punto de vida, puedes descartar una de tus flechas.', img: 'pedro_ramirez_8.jpg'},
        {n: 'Rose Doolan', v: 9, d: 'Puedes usar (1) o (2) con jugadores que estén un puesto más allá.', img: 'rose_doolan_9.jpg'},
        {n: 'Sid Ketchum', v: 8, d: 'Al comienzo de tu turno, cualquier jugador de tu elección obtiene 1 punto de vida.', img: 'sid_ketchum_8.jpg'},
        {n: 'Slab el asesino', v: 8, d: 'Una vez por turno, puedes usar una cerveza para quitar 2 puntos de vida de un (1) a un (2).', img: 'slab_8.jpg'},
        {n: 'Suzy Lafayette', v: 8, d: 'Si al final de tu turno no sacaste ningún (1) o (2), obtienes 2 puntos de vida.', img: 'suzy_lafayette_8.jpg'},
        {n: 'Buitre Sam', v: 9, d: 'Cada vez que otro jugador es eliminado, obtienes 2 puntos de vida.', img: 'buitre_sam_9.jpg'},
        {n: 'Willy el Niño', v: 8, d: 'Sólo necesitas 2 dados para usar la ametralladora Gatling.', img: 'willy_el_nino_8.jpg'}

    ];

    const diceConfig = { '🏹': 'flecha.png', '💣': 'dinamita.png', '🎯1': '1.png', '🎯2': '2.png', '🍺': 'cerveza.png', '🔫': 'gatling.png' };
    let rollCount = 3, reserved = [], activeDice = [], totalArrows = 0;
    let maxHPs = {};
    let indianAttackActive = false;

    function startGame() {
document.getElementById('bg-music').play().catch(e => console.log("La reproducción automática fue bloqueada"));
const music = document.getElementById('bg-music');
    music.volume = 0.3;
    music.play().catch(e => console.log("Bloqueo de autoplay"));
    musicPlaying = true;
        const nPlayers = parseInt(document.getElementById('player-count').value);
        document.getElementById('setup-screen').style.display = 'none';
        const container = document.getElementById('board-container');
        container.style.display = 'grid';
        
        const pool = [...charsData].sort(() => 0.5 - Math.random());
        for(let i=0; i<nPlayers; i++) {
            const p = pool[i];
            maxHPs[i] = p.v;
            const div = document.createElement('div');
            div.className = `player-card p-pos-${i}`;
            div.id = `player-${i}`;
            div.dataset.charName = p.n;
            div.innerHTML = `
                <div class="delete-btn" onclick="eliminatePlayer(${i})">X</div>
                <img src="images/star.png" class="sheriff-badge" id="badge-${i}" style="display:none;">
                <div class="card-content">
                    <div class="char-name">${p.n.toUpperCase()} (${p.v})</div>
                    <div class="char-desc">${p.d}</div>
                    <img src="images/${p.img}" class="char-portrait" onclick="zoomChar('${p.n}', 'images/${p.img}', '${p.d}')">
                </div>
                <div class="stats">
                    <span>❤️ <b id="hp-${i}">${p.v}</b></span>
                    <span>🏹 <b id="ar-${i}">0</b></span>
                </div>
                <div style="display:flex; justify-content:center; gap:5px; margin-top:5px;">
                    <button class="mod-btn" onclick="modStat(${i},'hp',1)">+</button>
                    <button class="mod-btn" onclick="modStat(${i},'hp',-1)">-</button>
                    <button class="mod-btn arrow-ctrl" onclick="modStat(${i},'ar',1)">🏹+</button>
                    <button class="mod-btn arrow-ctrl" onclick="modStat(${i},'ar',-1)">-</button>
                </div>
                <button id="sh-btn-${i}" onclick="setSheriff(${i})" style="width:100%; margin-top:5px; font-size:0.6rem; cursor:pointer;">¿SHERIFF?</button>
            `;
            container.appendChild(div);
        }
    }

    function modStat(id, type, val) {
        if(type === 'ar' && indianAttackActive) return; // Bloqueo durante ataque indio

        const el = document.getElementById(`${type}-${id}`);
        let cur = parseInt(el.innerText);
        if(type === 'hp') {
            if(val > 0 && cur >= maxHPs[id]) return;
            el.innerText = Math.max(0, cur + val);
        } else {
            el.innerText = Math.max(0, cur + val);
            updateGlobalArrows();
        }
    }

    function updateGlobalArrows() {
        let count = 0;
        document.querySelectorAll('[id^="ar-"]').forEach(e => {
            if(e.closest('.player-card').style.display !== 'none') count += parseInt(e.innerText);
        });
        totalArrows = count;
        document.getElementById('arrow-pool').innerText = `FLECHAS: ${totalArrows} / 9`;
        
        if(totalArrows >= 9) {
            indianAttackActive = true;
            document.getElementById('indian-popup').style.display = 'block';
            document.querySelectorAll('.arrow-ctrl').forEach(b => b.disabled = true);
        }
    }

    function processIndianAttack() {
        document.querySelectorAll('.player-card').forEach((card, i) => {
            if(card.style.display !== 'none') {
                const hpEl = document.getElementById(`hp-${i}`);
                const arEl = document.getElementById(`ar-${i}`);
                if(!hpEl) return;
                let damage = parseInt(arEl.innerText);
                if(card.dataset.charName === 'Jourdonnais' && damage > 1) damage = 1;
                hpEl.innerText = Math.max(0, parseInt(hpEl.innerText) - damage);
                arEl.innerText = "0";
            }
        });
        totalArrows = 0;
        indianAttackActive = false;
        document.getElementById('arrow-pool').innerText = "FLECHAS: 0 / 9";
        document.getElementById('indian-popup').style.display = 'none';
        document.querySelectorAll('.arrow-ctrl').forEach(b => b.disabled = false);
    }

    function handleRoll() {
playSound('snd-dice'); // <--- SONIDO DE DADOS
        if(rollCount <= 0) return;
        const faces = Object.keys(diceConfig);
        const diceToRoll = 5 - reserved.length;
        activeDice = [];
        for(let i=0; i < diceToRoll; i++) {
            const result = faces[Math.floor(Math.random()*6)];
            if(result === '💣') reserved.push(result); // Autolock
            else activeDice.push(result);
        }
        rollCount--;
        updateDiceDisplay();
        if(reserved.filter(x => x === '💣').length >= 3) {
            document.getElementById('game-msg').innerText = "¡BOOM! Pierdes 1 punto de vida y resuelve los dados.";
            document.getElementById('roll-btn').disabled = true;
        }
    }

    function moveToRes(idx) {
        reserved.push(activeDice[idx]);
        activeDice.splice(idx, 1);
        updateDiceDisplay();
    }

    function updateDiceDisplay() {
        const rz = document.getElementById('roll-zone');
        const resz = document.getElementById('reserve-zone');
        rz.innerHTML = ''; resz.innerHTML = '';
        activeDice.forEach((f, i) => {
            const d = document.createElement('div'); d.className = 'die';
            d.innerHTML = `<img src="images/${diceConfig[f]}">`;
            d.onclick = () => moveToRes(i); rz.appendChild(d);
        });
        reserved.forEach(f => {
            const d = document.createElement('div'); 
            d.className = 'die' + (f === '💣' ? ' locked' : '');
            d.innerHTML = `<img src="images/${diceConfig[f]}">`;
            resz.appendChild(d);
        });
        document.getElementById('roll-btn').innerText = `LANZAR (${rollCount})`;
    }

    function setSheriff(id) {
        document.getElementById(`badge-${id}`).style.display = 'block';
        document.getElementById(`player-${id}`).classList.add('is-sheriff');
        maxHPs[id] += 2;
        document.getElementById(`hp-${id}`).innerText = maxHPs[id];
        document.querySelectorAll('[id^="sh-btn-"]').forEach(b => b.remove());
    }

    function endTurn() {
        rollCount = 3; reserved = []; activeDice = [];
        document.getElementById('roll-btn').disabled = false;
        document.getElementById('game-msg').innerText = "";
        updateDiceDisplay();
    }

    function eliminatePlayer(id) {
        if(confirm("¿Eliminar?")) {
            document.getElementById(`player-${id}`).style.display = 'none';
            updateGlobalArrows();
        }
    }

    function zoomChar(name, img, desc) {
        document.getElementById('modal-name').innerText = name;
        document.getElementById('modal-img').src = img;
        document.getElementById('modal-desc').innerText = desc;
        document.getElementById('char-modal').style.display = 'flex';
    }
</script>

<div id="game-footer" style="width: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; gap: 30px; padding: 20px 0; margin-top: 20px; border-top: 2px solid var(--gold);">
    
    <div onclick="toggleMusic()" style="cursor: pointer; display: flex; align-items: center; gap: 10px; color: white; font-weight: bold; font-size: 1rem; border: 1px solid #555; padding: 8px 15px; border-radius: 5px; background: rgba(255,255,255,0.05);">
        <span id="music-icon" style="font-size: 1.5rem;">🔊</span>
        <span id="music-status">MÚSICA: ON</span>
    </div>
    <a href="images/resumen.jpg" target="_blank" style="color: var(--gold); text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 10px; font-size: 1rem; border: 2px solid var(--gold); padding: 8px 20px; border-radius: 5px; background: rgba(0,0,0,0.3);">
        <span>📖</span> CARTA RESUMEN
    </a>

    <a href="images/bang_dice_reglas.pdf" target="_blank" style="color: var(--gold); text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 10px; font-size: 1rem; border: 2px solid var(--gold); padding: 8px 20px; border-radius: 5px; background: rgba(0,0,0,0.3);">
        <span>📖</span> REGLAS
    </a>
</div>

<audio id="bg-music" loop>
    <source src="western-music.mp3" type="audio/mpeg">
</audio>

</body>
</html>
